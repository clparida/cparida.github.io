<script>
  const studies = [
    { title: "Oceanic Biophysical Interactions", desc: "Understanding the dynamic link between marine life and physical ocean processes." },
    { title: "Ocean Biogeochemistry", desc: "Tracking the chemical cycles that sustain ocean health and climate balance." },
    { title: "Marine Optics", desc: "Revealing how light interacts with the ocean to study clarity, productivity, and ecosystems." },
    { title: "Ocean Colour Remote Sensing", desc: "Detecting ocean health and productivity from satellite color signals." },
    { title: "Climate Change", desc: "Assessing oceans’ role in climate shifts and guiding adaptation strategies." },
    { title: "Bio‑optical & Coupled‑Optical‑Biogeochemical Modelling", desc: "Integrating light and biology to predict marine ecosystem responses." },
    { title: "Emerging & Advanced Ocean Observation", desc: "Harnessing next-gen drones for ultra-detailed, real-time ocean monitoring." }
  ];

  let index = 0;
  function showNextStudy() {
    const titleEl = document.getElementById("study-title");
    const descEl = document.getElementById("study-desc");
    titleEl.style.opacity = 0;
    descEl.style.opacity = 0;
    setTimeout(() => {
      titleEl.textContent = studies[index].title;
      descEl.textContent = studies[index].desc;
      titleEl.style.opacity = 1;
      descEl.style.opacity = 1;
      index = (index + 1) % studies.length;
    }, 500);
  }
  setInterval(showNextStudy, 5000);

  particlesJS('particles-js', {
    "particles": {
      "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
      "color": { "value": "#00ffff" },
      "shape": { "type": "circle" },
      "opacity": { "value": 0.9 },
      "size": { "value": 5, "random": true },
      "line_linked": { "enable": true, "distance": 150, "color": "#00ffff", "opacity": 0.8, "width": 1 },
      "move": { "enable": true, "speed": 6, "direction": "none", "out_mode": "out" }
    },
    "interactivity": {
      "detect_on": "canvas",
      "events": { "onhover": { "enable": true, "mode": "repulse" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
      "modes": { "repulse": { "distance": 200 }, "push": { "particles_nb": 4 } }
    },
    "retina_detect": true
  });
</script>
