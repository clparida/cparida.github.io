<!-- ===== SCRIPTS ===== -->
<script src="assets/vendor/jquery/jquery.min.js"></script>
<script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/vendor/particles.js/particles.min.js"></script>

<script>
  const studies = [
    { title: "Oceanic Biophysical Interactions", desc: "Understanding marine life and ocean physics." },
    { title: "Ocean Biogeochemistry", desc: "Tracking chemical cycles in oceans." },
    { title: "Marine Optics", desc: "Studying light interaction in ocean systems." },
    { title: "Ocean Colour Remote Sensing", desc: "Monitoring ocean health from satellites." },
    { title: "Climate Change", desc: "Understanding ocean-climate interactions." }
  ];

  let index = 0;

  function showNextStudy() {
    const title = document.getElementById("study-title");
    const desc = document.getElementById("study-desc");

    title.style.opacity = 0;
    desc.style.opacity = 0;

    setTimeout(() => {
      title.textContent = studies[index].title;
      desc.textContent = studies[index].desc;

      title.style.opacity = 1;
      desc.style.opacity = 1;

      index = (index + 1) % studies.length;
    }, 400);
  }

  setInterval(showNextStudy, 4000);

  particlesJS('particles-js', {
    particles: {
      number: { value: 70 },
      color: { value: "#4db6ac" },
      size: { value: 4 },
      line_linked: { enable: true, color: "#4db6ac" }
    }
  });

  // Footer year
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
